[mypy]
files = src/basicpy, tests/
exclude = \.git/, migrations/, examples/, misc_notebooks/
mypy_path = src/
# Allow untyped imports for packages without stubs
ignore_missing_imports = False

# Ignore missing imports for external libraries
[mypy-numpy]
ignore_missing_imports = True

[mypy-scipy]
ignore_missing_imports = True

[mypy-scipy.fft]
ignore_missing_imports = True

[mypy-jax]
ignore_missing_imports = True

[mypy-jax.*]
ignore_missing_imports = True

[mypy-jaxlib]
ignore_missing_imports = True

[mypy-pydantic]
ignore_missing_imports = True

[mypy-hyperactive]
ignore_missing_imports = True

[mypy-hyperactive.*]
ignore_missing_imports = True

[mypy-pooch]
ignore_missing_imports = True

[mypy-skimage]
ignore_missing_imports = True

[mypy-skimage.*]
ignore_missing_imports = True

[mypy-scikit-image]
ignore_missing_imports = True

[mypy-dask]
ignore_missing_imports = True

[mypy-dask.*]
ignore_missing_imports = True

[mypy-torch]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-torch_dct]
ignore_missing_imports = True

[mypy-tifffile]
ignore_missing_imports = True

[mypy-tqdm]
ignore_missing_imports = True
